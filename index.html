<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdeen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold-bright: #f0c040;
    --gold-mid:    #c9a84c;
    --gold-deep:   #8a6820;
    --bg:          #04040a;
  }
  html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; cursor:none; }

  /* ── Zoom wrapper ── */
  #zoom-root {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transform-origin: center center;
  }
  @media (min-width: 700px) {
    #zoom-root { transform: scale(3); }
  }
  @media (max-width: 699px) {
    #zoom-root { transform: scale(2); }
  }

  #cursor { position:fixed; pointer-events:none; z-index:9999; width:8px; height:8px; border-radius:50%; background:var(--gold-bright); transform:translate(-50%,-50%); mix-blend-mode:screen; }
  #cursor-ring { position:fixed; pointer-events:none; z-index:9998; width:32px; height:32px; border-radius:50%; border:1px solid rgba(201,168,76,0.5); transform:translate(-50%,-50%); transition:width .25s,height .25s,border-color .25s; }
  body:has(.node:hover) #cursor-ring { width:52px; height:52px; border-color:var(--gold-mid); }

  #stars { position:fixed; inset:0; z-index:0; }
  #orbit-svg { position:fixed; inset:0; z-index:1; width:100%; height:100%; pointer-events:none; }
  #scene { position:fixed; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; }

  #logo-wrap {
    position:absolute; width:260px; height:260px;
    display:flex; align-items:center; justify-content:center; z-index:10;
    animation:logoBreath 4s ease-in-out infinite;
  }
  #logo-wrap img { width:240px; height:auto; }
  @keyframes logoBreath {
    0%,100% { filter:drop-shadow(0 0 30px rgba(201,168,76,0.35)); transform:scale(1); }
    50%     { filter:drop-shadow(0 0 60px rgba(240,192,64,0.65)); transform:scale(1.04); }
  }

  #brand {
    position:absolute; top:calc(50% + 118px); left:50%; transform:translateX(-50%);
    text-align:center; z-index:10; animation:fadeUp 1.5s ease forwards; opacity:0;
  }
  #brand h1 { font-family:'Cinzel',serif; font-size:clamp(18px,3vw,28px); font-weight:400; letter-spacing:14px; color:var(--gold-mid); text-transform:uppercase; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateX(-50%) translateY(12px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }

  /* ── Nodes ── */
  .node {
    position:absolute; z-index:10; transform:translate(-50%,-50%);
    cursor:none; text-decoration:none;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    animation:nodeFadeIn 0.6s ease forwards; opacity:0;
  }
  .node-gem {
    width:76px; height:76px; border-radius:50%;
    border:1.5px solid rgba(201,168,76,0.5);
    background:radial-gradient(circle at 40% 35%, rgba(20,15,5,0.85), rgba(4,4,10,0.97));
    display:flex; align-items:center; justify-content:center;
    position:relative; transition:all 0.35s cubic-bezier(.25,.46,.45,.94);
    overflow:hidden;
    box-shadow:0 0 10px rgba(201,168,76,0.1), inset 0 0 12px rgba(201,168,76,0.05);
  }
  .node-gem::before {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:1px solid rgba(201,168,76,0.15); transition:all 0.35s ease;
  }
  .node-gem img { width:52px; height:52px; object-fit:contain; }
  .node-gem svg { width:32px; height:32px; }
  .node:hover .node-gem {
    border-color:var(--gold-bright);
    box-shadow:0 0 28px rgba(201,168,76,0.55), inset 0 0 18px rgba(201,168,76,0.12);
    transform:scale(1.18);
    background:radial-gradient(circle at 40% 35%, rgba(40,30,5,0.9), rgba(8,8,18,0.98));
  }
  .node:hover .node-gem::before { inset:-12px; border-color:rgba(201,168,76,0.3); }

  .node-label {
    font-family:'Cinzel',serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    color:#e8d080;
    text-transform:uppercase;
    text-align:center;
    max-width:120px;
    line-height:1.4;
    transition:color 0.3s;
    white-space:normal;
    text-shadow:0 1px 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.8);
  }
  .node-sub {
    font-family:'Raleway',sans-serif;
    font-weight:300;
    font-size:10px;
    letter-spacing:1.5px;
    color:#b09040;
    text-align:center;
    max-width:130px;
    line-height:1.3;
    transition:color 0.3s;
    white-space:nowrap;
    text-shadow:0 1px 4px rgba(0,0,0,0.9);
  }
  .node:hover .node-label { color:#fff5c0; }
  .node:hover .node-sub   { color:#d4aa55; }

  @keyframes nodeFadeIn {
    from { opacity:0; transform:translate(-50%,-50%) scale(0.6); }
    to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
  }

  /* ── Preview card ── */
  #preview-card {
    position:fixed; z-index:300; width:230px;
    background:rgba(4,4,10,0.97);
    border:1px solid rgba(201,168,76,0.45);
    border-radius:10px; overflow:hidden;
    pointer-events:none; opacity:0;
    transform:scale(0.92) translateY(6px);
    transition:opacity 0.22s ease, transform 0.22s ease;
    box-shadow:0 8px 36px rgba(0,0,0,0.7), 0 0 24px rgba(201,168,76,0.1);
  }
  #preview-card.show { opacity:1; transform:scale(1) translateY(0); }
  .pc-header {
    background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.04));
    padding:14px 16px 12px;
    border-bottom:1px solid rgba(201,168,76,0.2);
    display:flex; align-items:center; gap:12px;
  }
  .pc-icon { width:40px; height:40px; flex-shrink:0; border-radius:50%; border:1px solid rgba(201,168,76,0.4); background:rgba(4,4,10,0.9); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .pc-icon img { width:28px; height:28px; object-fit:contain; }
  .pc-icon svg { width:18px; height:18px; }
  .pc-title { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:1px; color:#e8d080; text-transform:uppercase; line-height:1.4; }
  .pc-url { font-family:'Raleway',sans-serif; font-weight:300; font-size:10px; color:rgba(201,168,76,0.5); margin-top:2px; letter-spacing:1px; }
  .pc-body { padding:12px 16px 14px; }
  .pc-desc { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:rgba(220,190,100,0.8); line-height:1.6; }
  .pc-cta { margin-top:10px; font-family:'Raleway',sans-serif; font-weight:300; font-size:9px; letter-spacing:3px; color:rgba(201,168,76,0.4); text-transform:uppercase; }

  .burst { position:fixed; pointer-events:none; z-index:999; }
  .burst-dot { position:absolute; width:4px; height:4px; border-radius:50%; background:var(--gold-bright); transform:translate(-50%,-50%); }

  #footer { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-family:'Raleway',sans-serif; font-weight:200; font-size:10px; letter-spacing:4px; color:rgba(201,168,76,0.2); z-index:10; text-transform:uppercase; animation:fadeUp 2s 2s ease forwards; opacity:0; }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="stars"></canvas>
<svg id="orbit-svg"></svg>
<div id="scene">
  <div id="logo-wrap"><img src="abdeen-uk.png" alt="Abdeen Logo"></div>
  <div id="brand"><h1>Abdeen</h1></div>
</div>
<div id="preview-card">
  <div class="pc-header">
    <div class="pc-icon" id="pc-icon"></div>
    <div><div class="pc-title" id="pc-title"></div><div class="pc-url" id="pc-url"></div></div>
  </div>
  <div class="pc-body"><div class="pc-desc" id="pc-desc"></div><div class="pc-cta">Click to visit →</div></div>
</div>
<div id="footer">abdeen.uk · all rights reserved</div>

    url: "#",
    iconHTML: clubIcon
  }
];

// ── Stars ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H, stars = [];
function initStars() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  stars = Array.from({length:220}, () => ({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.2+0.2, a:Math.random(), da:(Math.random()-0.5)*0.003
  }));
}
function drawStars() {
  ctx.clearRect(0,0,W,H);
  stars.forEach(s => {
    s.a = Math.max(0.05, Math.min(1, s.a+s.da));
    if (s.a<=0.05||s.a>=1) s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,192,64,${s.a*0.6})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
initStars(); drawStars();

// ── Single orbit ring ──
const svg = document.getElementById('orbit-svg');
const ORBIT_R = 320;

function buildOrbits() {
  svg.innerHTML = '';
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  const scale = window.innerWidth < 700 ? 0.65 : 1;
  const r = ORBIT_R * scale;

  // Single circle ring
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx', cx); ring.setAttribute('cy', cy);
  ring.setAttribute('r', r);
  ring.setAttribute('fill','none');
  ring.setAttribute('stroke','rgba(201,168,76,0.18)');
  ring.setAttribute('stroke-width','1');
  ring.setAttribute('stroke-dasharray','4 8');
  svg.appendChild(ring);

  // Lines group
  const lg = document.createElementNS('http://www.w3.org/2000/svg','g');
  lg.id = 'lines-group'; svg.appendChild(lg);
}
buildOrbits();

// ── Place nodes — train formation on single ring ──
const scene = document.getElementById('scene');
let nodeEls = [];
// Single shared angle — all nodes spaced evenly on one ring, moving together
let trainAngle = 0;
const TRAIN_SPEED = 0.00022; // radians per ms

function getCenter() { return {cx:window.innerWidth/2, cy:window.innerHeight/2}; }

function placeNodes() {
  nodeEls.forEach(n => n.remove()); nodeEls = [];
  buildOrbits();
  const n = services.length;
  services.forEach((svc, i) => {
    const el = document.createElement('a');
    el.className = 'node';
    el.href = svc.url;
    if (svc.url !== '#') el.target = '_blank';
    el.rel = 'noopener';
    el.style.animationDelay = `${0.2 + i*0.1}s`;
    el.innerHTML = `
      <div class="node-gem">${svc.iconHTML}</div>
      <div class="node-label">${svc.label}</div>
      <div class="node-sub">${svc.sub}</div>
    `;
    el.addEventListener('mouseenter', () => {
      hoveredNode = true;
      const gem = el.querySelector('.node-gem');
      pcIcon.innerHTML = gem.innerHTML;
      pcTitle.textContent = svc.label;
      pcUrl.textContent = svc.sub;
      pcDesc.textContent = svc.desc;
      previewCard.classList.add('show');
    });
    el.addEventListener('mouseleave', () => { hoveredNode = false; previewCard.classList.remove('show'); });
    scene.appendChild(el);
    nodeEls.push(el);
  });
}
placeNodes();

// ── Animation loop ──
let lastTime = 0;
let hoveredNode = false;
function animate(ts) {
  const dt = Math.min(ts - lastTime, 50); lastTime = ts;
  const {cx, cy} = getCenter();
  const scale = window.innerWidth < 700 ? 0.65 : 1;
  const r = ORBIT_R * scale;
  const n = services.length;
  const gap = (Math.PI * 2) / n;

  if (!hoveredNode) trainAngle += TRAIN_SPEED * dt;

  const lg = document.getElementById('lines-group');
  if (lg) lg.innerHTML = '';

  nodeEls.forEach((el, i) => {
    const angle = trainAngle + gap * i;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.zIndex = '10';
    el.style.transform = 'translate(-50%,-50%)';
  });

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ── Cursor + preview card ──
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
const previewCard = document.getElementById('preview-card');
const pcIcon = document.getElementById('pc-icon');
const pcTitle = document.getElementById('pc-title');
const pcUrl = document.getElementById('pc-url');
const pcDesc = document.getElementById('pc-desc');

document.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  cursor.style.left = mx+'px'; cursor.style.top = my+'px';
  cursorRing.style.left = mx+'px'; cursorRing.style.top = my+'px';
  let px = mx+24, py = my-20;
  if (px+250 > window.innerWidth)  px = mx-250;
  if (py+210 > window.innerHeight) py = my-210;
  previewCard.style.left = px+'px'; previewCard.style.top = py+'px';
});

// ── Particle burst ──
document.addEventListener('click', e => {
  if (e.target.closest('.node')) burst(e.clientX, e.clientY);
});
function burst(x, y) {
  const wrap = document.createElement('div');
  wrap.className = 'burst'; wrap.style.left = x+'px'; wrap.style.top = y+'px';
  document.body.appendChild(wrap);
  for (let i=0; i<14; i++) {
    const dot = document.createElement('div'); dot.className = 'burst-dot';
    const angle = (i/14)*Math.PI*2, dist = 30+Math.random()*30;
    dot.style.background = Math.random()>0.5 ? 'var(--gold-bright)' : 'var(--gold-mid)';
    dot.style.transition = `transform ${0.4+Math.random()*0.3}s cubic-bezier(.25,.46,.45,.94),opacity 0.5s`;
    wrap.appendChild(dot);
    requestAnimationFrame(() => {
      dot.style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
      dot.style.opacity = '0';
    });
  }
  setTimeout(() => wrap.remove(), 800);
}

window.addEventListener('resize', () => { initStars(); placeNodes(); });
</script>
